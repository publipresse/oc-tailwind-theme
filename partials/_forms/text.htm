{% set id = (id) ? id : (label ? 'field-' ~ name|slug : null) %}
{% set type = type|default('text') %}

<div class="field">
    {% if label %}
        <label class="label" for="{{ id }}">{{ label }}</label>
    {% endif %}
    <label class="input validator w-full">
        {% if hasPlaceholder('prefix') %}
            <span class="label">{% placeholder prefix %}</span>
        {% endif %}
        <input 
            type="text" 
            name="{{ name }}" 
            value="{{ value }}" 
            placeholder="{{ placeholder }}"
            {% if id %}id="{{ id }}"{% endif %}
            {% if required %}required{% endif %}
            {% if autocomplete %}autocomplete="{{ autocomplete }}"{% endif %}
            {% if pattern %}pattern="{{ pattern }}"{% endif %}
            {% placeholder attributes %}
        />
        {% if hasPlaceholder('suffix') %}
            <span class="label">{% placeholder suffix %}</span>
        {% endif %}
    </label>
    {% if hasPlaceholder('comment') %}
        <div class="label">{% placeholder comment %}</div>
    {% endif %}
    <p class="validator-hint" data-validate-for="{{ name }}">{% placeholder validation %}</p>
</div>
