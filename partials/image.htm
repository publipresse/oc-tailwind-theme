{% set image = image|resize(width, height, mode|default('crop')) %}
{% set alt = alt|default(image.title)|default(image.description) %}
{% set loading = loading|default('lazy') %}
<img 
    {% if id %}id="{{ id }}"{% endif %}
    {% if class %}class="{{ class }}"{% endif %}
    src="{{ image }}" 
    alt="{{ alt }}"
    {{ image|imagedimensions }}
    loading="{{ loading }}"
>
